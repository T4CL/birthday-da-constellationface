<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soph Birthday</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <audio id="bg-music" loop>
  <source src="/assets/song.mp3" type="audio/mpeg">
</audio>

    <div id="start-screen">
        <h1 class="title">Soph Birthday</h1>
        <img src="/assets/parada.png" class="character-thumb">
        <p class="hint">Sophia não pode se atrasar!<br>Tente não se distrair com os pibbles no caminho! 🐶</p>
        <button id="start-btn">Jogar</button>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <img src="/assets/pngcorrendo.gif" id="player-sprite">
        <img src="/assets/elly.png" id="elly-sprite">
    </div>

    <div id="end-screen">
    <div id="iris-effect"></div>
    <div class="final-content">
        <!-- O nome da imagem deve ser este ou mude para o seu -->
        <img src="/assets/cake.png" id="bolo-pixel">
        <button id="retry-btn">Play Again</button>
    </div>
</div>


    <script src="script.js"></script>
</body>
</html>
